<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Marketing, software y diseño para negocios que necesitan verse mejor, operar con más orden y vender con más claridad."
    />
    <meta name="theme-color" content="#f4eadc" id="theme-color-meta" />
    <title>ImpulsaPyME | Marketing, software y diseño para negocios</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body data-page="home">
    <div class="background-glow background-glow--left"></div>
    <div class="background-glow background-glow--right"></div>
    <div class="home-route-loader" data-home-loader aria-hidden="true">
      <span class="home-route-loader__bar"></span>
    </div>

    <div class="site-shell site-shell--home">
      <div data-site-topbar></div>

      <main class="home-lab-main">
        <section
          class="home-lab-hero"
          data-preview-root
          data-preview-default-id="home"
          data-preview-default-url=""
          data-preview-default-label="Elige una ruta"
          data-preview-default-status="La idea sigue encendida"
        >
          <div data-site-bubbles></div>

          <div class="home-preview-stage reveal">
            <div class="home-preview-stage__screen">
              <article
                class="home-preview-panel home-preview-panel--home is-active"
                data-preview-panel="home"
                aria-hidden="false"
              >
                <div class="home-preview-homecover">
                  <div class="home-preview-homecover__intro">
                    <p class="panel-label">Transmisión 01 · ImpulsaPyME</p>
                    <strong>Hay algo en tu negocio pidiendo aparecer.</strong>
                    <p>
                      No todo lo valioso entra haciendo ruido. A veces basta una
                      chispa para revelar qué parte de tu marca, tu operación o
                      tu presencia ya está lista para volverse imposible de
                      ignorar.
                    </p>
                  </div>

                  <div
                    class="home-preview-brainlamp"
                    data-tilt
                    data-tilt-base-x="-8"
                    data-tilt-base-y="14"
                    data-tilt-range-x="9"
                    data-tilt-range-y="11"
                    aria-hidden="true"
                  >
                    <div class="home-preview-brainlamp__stage">
                      <span class="home-preview-brainlamp__cord"></span>
                      <span class="home-preview-brainlamp__socket"></span>
                      <span class="home-preview-brainlamp__halo"></span>

                      <div class="home-preview-brainlamp__glass">
                        <div class="home-preview-brainlamp__brain">
                          <span class="home-preview-brainlamp__lobe home-preview-brainlamp__lobe--one"></span>
                          <span class="home-preview-brainlamp__lobe home-preview-brainlamp__lobe--two"></span>
                          <span class="home-preview-brainlamp__lobe home-preview-brainlamp__lobe--three"></span>
                          <span class="home-preview-brainlamp__lobe home-preview-brainlamp__lobe--four"></span>
                          <span class="home-preview-brainlamp__lobe home-preview-brainlamp__lobe--five"></span>
                          <span class="home-preview-brainlamp__lobe home-preview-brainlamp__lobe--six"></span>
                        </div>

                        <span class="home-preview-brainlamp__stem"></span>
                      </div>

                      <span class="home-preview-brainlamp__beam"></span>
                      <span class="home-preview-brainlamp__floor"></span>
                      <span class="home-preview-brainlamp__spark home-preview-brainlamp__spark--one"></span>
                      <span class="home-preview-brainlamp__spark home-preview-brainlamp__spark--two"></span>
                      <span class="home-preview-brainlamp__spark home-preview-brainlamp__spark--three"></span>
                      <span class="home-preview-brainlamp__spark home-preview-brainlamp__spark--four"></span>
                    </div>
                  </div>
                </div>
              </article>

              <article
                class="home-preview-panel"
                data-preview-panel="marketing"
                aria-hidden="true"
                style="--preview-scale: 0.93; --preview-offset-y: -46px"
              >
                <div class="home-preview-panel__viewport">
                  <iframe
                    data-preview-src="marketing.html"
                    title="Vista previa de Marketing"
                    loading="lazy"
                    tabindex="-1"
                  ></iframe>
                </div>
              </article>

              <article
                class="home-preview-panel"
                data-preview-panel="software"
                aria-hidden="true"
                style="--preview-scale: 0.9; --preview-offset-y: -26px"
              >
                <div class="home-preview-panel__viewport">
                  <iframe
                    data-preview-src="software.html"
                    title="Vista previa de Sistemas"
                    loading="lazy"
                    tabindex="-1"
                  ></iframe>
                </div>
              </article>

              <article
                class="home-preview-panel"
                data-preview-panel="design"
                aria-hidden="true"
                style="--preview-scale: 0.88; --preview-offset-y: -22px"
              >
                <div class="home-preview-panel__viewport">
                  <iframe
                    data-preview-src="diseno.html"
                    title="Vista previa de Diseño"
                    loading="lazy"
                    tabindex="-1"
                  ></iframe>
                </div>
              </article>
            </div>

            <div class="home-preview-stage__controls">
              <p class="home-preview-stage__status" data-preview-status>
                La idea sigue encendida
              </p>
              <a
                class="button button-primary home-preview-stage__link is-disabled"
                href="#"
                data-preview-link
                aria-disabled="true"
              >
                <span data-preview-link-label>Elige una ruta</span>
              </a>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
