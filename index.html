<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ImpulsaPyME desarrolla sistemas, marketing digital y diseño gráfico para empresas de cualquier rubro que buscan crecer con soluciones adaptadas."
    />
    <meta name="theme-color" content="#f4eadc" id="theme-color-meta" />
    <title>ImpulsaPyME | Soluciones digitales para PyMEs</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body data-page="home">
    <div class="background-glow background-glow--left"></div>
    <div class="background-glow background-glow--right"></div>
    <div class="home-route-loader" data-home-loader aria-hidden="true">
      <span class="home-route-loader__bar"></span>
    </div>

    <div class="site-shell site-shell--home">
      <div data-site-topbar></div>

      <main class="home-lab-main">
        <section
          class="home-lab-hero"
          data-preview-root
          data-preview-default-id="home"
          data-preview-default-url=""
          data-preview-default-label="Selecciona un área"
          data-preview-default-status="Previsualización activa · Inicio"
        >
          <div data-site-bubbles></div>

          <div class="home-preview-stage reveal">
            <div class="home-preview-stage__screen">
              <article
                class="home-preview-panel home-preview-panel--home is-active"
                data-preview-panel="home"
                aria-hidden="false"
              >
                <div class="home-preview-homecover">
                  <p class="panel-label">ImpulsaPyME</p>
                  <strong
                    >Marketing, sistemas y diseño desde una sola
                    portada.</strong
                  >
                  <p>
                    Pasa el ratón por una burbuja y la vista completa aparece
                    aquí, sin marcos extra y ocupando casi toda la pantalla.
                  </p>
                </div>
              </article>

              <article
                class="home-preview-panel"
                data-preview-panel="marketing"
                aria-hidden="true"
                style="--preview-scale: 0.96; --preview-offset-y: -58px"
              >
                <div class="home-preview-panel__viewport">
                  <iframe
                    data-preview-src="marketing.html"
                    title="Vista previa de Marketing"
                    loading="lazy"
                    tabindex="-1"
                  ></iframe>
                </div>
              </article>

              <article
                class="home-preview-panel"
                data-preview-panel="software"
                aria-hidden="true"
                style="--preview-scale: 0.95; --preview-offset-y: -82px"
              >
                <div class="home-preview-panel__viewport">
                  <iframe
                    data-preview-src="software.html"
                    title="Vista previa de Sistemas"
                    loading="lazy"
                    tabindex="-1"
                  ></iframe>
                </div>
              </article>

              <article
                class="home-preview-panel"
                data-preview-panel="design"
                aria-hidden="true"
                style="--preview-scale: 0.92; --preview-offset-y: -34px"
              >
                <div class="home-preview-panel__viewport">
                  <iframe
                    data-preview-src="diseno.html"
                    title="Vista previa de Diseño"
                    loading="lazy"
                    tabindex="-1"
                  ></iframe>
                </div>
              </article>
            </div>

            <div class="home-preview-stage__controls">
              <p class="home-preview-stage__status" data-preview-status>
                Previsualización activa · Inicio
              </p>
              <a
                class="button button-primary home-preview-stage__link is-disabled"
                href="#"
                data-preview-link
                aria-disabled="true"
              >
                <span data-preview-link-label>Selecciona un área</span>
              </a>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
